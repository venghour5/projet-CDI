<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestion CDI - Modules ESP</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <header class="top-bar">
        <div class="header-left">
            <a href="CDI.html" class="nav-btn">Zone CDI</a>
            <a href="esp.html" class="nav-btn active">Modules ESP</a>
        </div>

        <div class="header-right">
            <span class="admin-name">Admin Mme -------</span>
            <a href="index.html" class="logout-link">Déconnexion</a>
        </div>
    </header>

    <main class="esp-page">
        <section class="esp-grid">

            <article class="esp-card">
                <div class="esp-card-top">
                    <div>
                        <h2>esp 10.1.1.1</h2>
                        <p>Roman</p>
                    </div>
                    <span class="status-badge on">ON</span>
                </div>

                <div class="esp-card-bottom">
                    <button class="disconnect-btn">Déconnecter</button>
                    <button class="esp-plus-btn">+</button>
                </div>
            </article>

            <article class="esp-card">
                <div class="esp-card-top">
                    <div>
                        <h2>esp 10.1.1.2</h2>
                        <p>Manga</p>
                    </div>
                    <span class="status-badge off">OFF</span>
                </div>

                <div class="esp-card-bottom">
                    <button class="disconnect-btn">Déconnecter</button>
                    <button class="esp-plus-btn">+</button>
                </div>
            </article>

            <article class="esp-card">
                <div class="esp-card-top">
                    <div>
                        <h2>esp 10.1.1.3</h2>
                        <p>BD</p>
                    </div>
                    <span class="status-badge on">ON</span>
                </div>

                <div class="esp-card-bottom">
                    <button class="disconnect-btn">Déconnecter</button>
                    <button class="esp-plus-btn">+</button>
                </div>
            </article>

            <article class="esp-add-card">
                <button class="big-plus-btn">+</button>
            </article>

        </section>
    </main>

</body>
</html>
