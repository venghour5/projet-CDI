 <style>
    /* --- Overlay plein écran --- */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6); /* fond sombre */
  display: none; /* caché par défaut */
